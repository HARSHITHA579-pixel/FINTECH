<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <!-- Drop shadow similar to the logo's gentle 3D effect -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="4" stdDeviation="3" flood-color="#2a3c1c" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Left Icon Group -->
  <g transform="translate(180, 140)">
    <!-- Base Circle Ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#68ae43" stroke-width="15" filter="url(#shadow)" />
    <!-- Outer darker border of ring to simulate 3D -->
    <circle cx="0" cy="0" r="118" fill="none" stroke="#2c421f" stroke-width="4" filter="url(#shadow)" />
    <!-- Inner darker border -->
    <circle cx="0" cy="0" r="102" fill="none" stroke="#48722c" stroke-width="2" />

    <!-- 'ft' shapes -->
    <g fill="none" stroke="#68ae43" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)">
      <!-- f stem: Starts top rightish, curves to left and goes down and slightly left -->
      <path d="M 15,-90 C 25,-105 50,-100 45,-60 L 5, 80 L -25, 170" />
      
      <!-- t stem: Starts straight, goes down, hooks right -->
      <path d="M 45,-10 L 15, 75 C 10,100 35,90 45,70" />

      <!-- continuous crossbar from left of circle to way out right -->
      <!-- In the image, the crossbar actually goes behind the right side of the circle? No, it looks like it's in front of everything or part of a flat logo -->
      <!-- But in the reference, the crossbar of the f/t extends rightward out of the circle -->
      <path d="M -80,-20 L 170,-20" stroke-width="18" />
    </g>
    <!-- Dark borders around 'ft' strokes to match the 3D look -->
    <g fill="none" stroke="#2c421f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
      <path d="M 15,-90 C 25,-105 50,-100 45,-60 L 5, 80 L -25, 170" />
      <path d="M 45,-10 L 15, 75 C 10,100 35,90 45,70" />
      <path d="M -80,-20 L 170,-20" />
    </g>
  </g>

  <!-- Right Text Group -->
  <g transform="translate(390, 140)">
    <!-- FINE TECH -->
    <text x="0" y="-10" font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="85" fill="#32491f" letter-spacing="2">FINE TECH</text>
    
    <!-- Subtitle: "Manufacturers of" -->
    <text x="5" y="40" font-family="Arial, Helvetica, sans-serif" font-style="italic" font-weight="600" font-size="22" fill="#555555" letter-spacing="3">Manufacturers of</text>
    
    <!-- Subtitle: "Precision Components &" -->
    <text x="5" y="75" font-family="Arial, Helvetica, sans-serif" font-style="italic" font-weight="600" font-size="22" fill="#555555" letter-spacing="3">Precision Components &amp;</text>
    
    <!-- Subtitle: "Assemblies" -->
    <text x="5" y="110" font-family="Arial, Helvetica, sans-serif" font-style="italic" font-weight="600" font-size="22" fill="#555555" letter-spacing="3">Assemblies</text>
  </g>
</svg>
